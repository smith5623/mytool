<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的 Electron 工具箱</title>
    <style>
      :root {
        color-scheme: light;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        background: #f4f7fb;
        color: #223042;
      }

      #sidebar {
        width: 220px;
        background: #223042;
        color: #edf2f7;
        padding: 24px 0;
        display: flex;
        flex-direction: column;
        box-shadow: 2px 0 10px rgba(15, 23, 42, 0.14);
      }

      #sidebar h2 {
        margin: 0 20px 20px;
        font-size: 20px;
        font-weight: 700;
      }

      #sidebar ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      #sidebar a {
        display: block;
        color: inherit;
        text-decoration: none;
        padding: 12px 20px;
        transition: background-color 0.2s ease;
      }

      #sidebar a:hover,
      #sidebar a.active {
        background: #182331;
      }

      #content-area {
        flex: 1;
        min-width: 0;
        padding: 24px;
        overflow-y: auto;
      }

      #app-header {
        margin-bottom: 24px;
      }

      #app-header h1 {
        margin: 0 0 8px;
        font-size: 28px;
        color: #162032;
      }

      #app-header p {
        margin: 0;
        color: #516174;
      }

      .tool-section {
        display: none;
      }

      .tool-section.active {
        display: block;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #d9e2ec;
        border-radius: 8px;
        padding: 24px;
      }

      .panel h2 {
        margin: 0 0 8px;
        font-size: 22px;
        color: #162032;
      }

      .panel p {
        margin: 0 0 18px;
        color: #5b6b7d;
        line-height: 1.6;
      }

      .field-row {
        display: flex;
        gap: 12px;
        align-items: end;
        margin-bottom: 16px;
      }

      .field {
        flex: 1;
        min-width: 0;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #243447;
      }

      input[type='text'] {
        width: 100%;
        min-height: 42px;
        padding: 10px 12px;
        border-radius: 6px;
        border: 1px solid #c6d3df;
        font-size: 14px;
        background: #fff;
      }

      .button-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 4px;
      }

      button {
        min-height: 42px;
        padding: 0 16px;
        border: none;
        border-radius: 6px;
        background: #2f80ed;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s ease;
      }

      button:hover {
        background: #2167c7;
      }

      button:disabled {
        background: #aeb8c2;
        cursor: not-allowed;
      }

      .status-message {
        margin-top: 18px;
        padding: 12px 14px;
        border-radius: 6px;
        border: 1px solid #d2dce6;
        background: #eef4fa;
        color: #33475b;
        min-height: 46px;
      }

      .status-message.success {
        background: #e9f8ef;
        border-color: #b8e2c6;
        color: #18663f;
      }

      .status-message.error {
        background: #fdeeee;
        border-color: #efc2c2;
        color: #a12424;
      }

      .progress-wrap {
        margin-top: 16px;
      }

      progress {
        width: 100%;
        height: 14px;
      }

      .progress-text {
        margin-top: 8px;
        color: #415365;
        font-size: 14px;
      }

      .log-box {
        margin-top: 14px;
        min-height: 160px;
        max-height: 220px;
        overflow: auto;
        padding: 12px;
        border-radius: 6px;
        background: #101923;
        color: #d6e2ee;
        font-family: Consolas, 'Courier New', monospace;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (max-width: 900px) {
        body {
          flex-direction: column;
        }

        #sidebar {
          width: 100%;
        }

        .field-row {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <aside id="sidebar">
      <h2>工具箱</h2>
      <ul>
        <li><a href="#" id="nav-string-replacer" class="active">批量重命名</a></li>
        <li><a href="#" id="nav-code-assistant">文件列表导出</a></li>
        <li><a href="#" id="nav-archive-extractor">批量解压文件</a></li>
      </ul>
    </aside>

    <main id="content-area">
      <header id="app-header">
        <h1>我的 Electron 工具箱</h1>
        <p>把常用的本地文件处理工具放到一个桌面应用里，直接点选就能用。</p>
      </header>

      <section id="string-replacer-tool" class="tool-section active">
        <div class="panel">
          <h2>批量重命名</h2>
          <p>选择一个文件夹后，递归替换文件和文件夹名称中的指定字符串。</p>

          <div class="field-row">
            <div class="field">
              <label for="folderPath">目标文件夹</label>
              <input type="text" id="folderPath" readonly placeholder="点击右侧按钮选择文件夹" />
            </div>
            <button id="selectFolderBtn">选择文件夹</button>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="searchString">查找字符串</label>
              <input type="text" id="searchString" placeholder="输入要查找的内容" />
            </div>
            <div class="field">
              <label for="replaceString">替换字符串</label>
              <input type="text" id="replaceString" placeholder="留空表示删除" />
            </div>
          </div>

          <div class="button-row">
            <button id="startRenameBtn">开始批量重命名</button>
          </div>

          <div class="status-message"></div>
        </div>
      </section>

      <section id="code-assistant-tool" class="tool-section">
        <div class="panel">
          <h2>文件列表导出</h2>
          <p>递归读取项目结构，生成一个 Markdown 文件，方便快速查看目录和文本文件内容。</p>

          <div class="field-row">
            <div class="field">
              <label for="codeAssistantFolderPath">项目文件夹</label>
              <input type="text" id="codeAssistantFolderPath" readonly placeholder="点击右侧按钮选择项目文件夹" />
            </div>
            <button id="selectCodeAssistantFolderBtn">选择文件夹</button>
          </div>

          <div class="button-row">
            <button id="generateFileListBtn">生成文件列表</button>
          </div>

          <div id="codeAssistantStatus" class="status-message"></div>
        </div>
      </section>

      <section id="archive-extractor-tool" class="tool-section">
        <div class="panel">
          <h2>批量解压文件</h2>
          <p>递归扫描所选文件夹中的压缩包，批量解压到各自所在目录，并自动去掉解压后的多层文件夹，只保留文件本身。</p>

          <div class="field-row">
            <div class="field">
              <label for="archiveFolderPath">待处理文件夹</label>
              <input type="text" id="archiveFolderPath" readonly placeholder="点击右侧按钮选择待处理文件夹" />
            </div>
            <button id="selectArchiveFolderBtn">选择文件夹</button>
          </div>

          <div class="button-row">
            <button id="extractArchivesBtn">开始批量解压</button>
          </div>

          <div class="progress-wrap">
            <progress id="archiveProgressBar" max="100" value="0"></progress>
            <div id="archiveProgressText" class="progress-text">等待开始</div>
            <div id="archiveLog" class="log-box"></div>
          </div>

          <div id="archiveStatus" class="status-message"></div>
        </div>
      </section>
    </main>
  </body>
</html>
